<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta id="myViewport" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>
        // Eğer cihazın ekranı 550px'ten küçükse, siteyi 550px'e sabitleyip ekrana sığacak şekilde küçült
        if (window.screen.width < 550) {
            document.getElementById("myViewport").setAttribute("content", "width=550, user-scalable=no");
        }
    </script>
    <title>Mimari Portfolyo</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/home.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="print-controls" class="hidden">PDF Formatına Geç</div>

    <main id="app">
        <section id="profile-block" class="block"></section>
        <section id="projects-grid" class="grid-container"></section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
